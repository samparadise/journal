<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Board — Summer Pages</title>
  <meta name="robots" content="noindex">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --purple-800:#2A2380; --purple-700:#3C3489; --purple-600:#4F46B8;
      --purple-500:#6B5FE4; --purple-300:#B8B2F6; --purple-100:#EEEDFE; --purple-50:#F5F4FF;
      --pink-500:#E85B8C; --yellow-400:#FAC775; --green-500:#1D9E75;
      --ink:#1a1a2e; --ink-light:#5F5E5A; --ink-muted:#9997B0; --border:#E0DEFA;
      --font-body:'Nunito',system-ui,sans-serif; --font-display:'Fredoka',system-ui,sans-serif;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:var(--font-body); font-size:15px; color:var(--ink); background:var(--purple-50);}

    header{
      background:var(--purple-700); padding:16px 28px;
      display:flex; align-items:center; justify-content:space-between;
    }
    .logo{display:flex; align-items:center; gap:11px;}
    .logo-mark{width:38px; height:38px; border-radius:11px; background:var(--yellow-400);
      display:flex; align-items:center; justify-content:center;}
    .logo-mark img{width:72%; height:72%; object-fit:contain;}
    .title{font-family:var(--font-display); font-size:20px; font-weight:600; color:#fff;}
    .title small{display:block; font-family:var(--font-body); font-size:12px; color:var(--purple-300); font-weight:600;}
    .gen{font-size:12px; color:var(--purple-300);}

    .container{max-width:1100px; margin:0 auto; padding:24px 28px 60px;}

    .stats{display:flex; gap:14px; margin-bottom:24px; flex-wrap:wrap;}
    .stat{
      flex:1; min-width:150px; background:#fff; border:1.5px solid var(--border);
      border-radius:16px; padding:18px 20px;
    }
    .stat-num{font-family:var(--font-display); font-size:32px; font-weight:600; color:var(--purple-700); line-height:1;}
    .stat-label{font-size:13px; font-weight:700; color:var(--ink-muted); margin-top:6px;}

    table{width:100%; border-collapse:collapse; background:#fff; border-radius:16px; overflow:hidden;
      box-shadow:0 2px 12px rgba(26,26,46,.06); border:1.5px solid var(--border);}
    thead th{
      text-align:left; font-size:12px; font-weight:800; color:var(--ink-muted);
      text-transform:uppercase; letter-spacing:.05em; padding:13px 16px;
      border-bottom:1.5px solid var(--border); background:var(--purple-50);
    }
    tbody td{padding:13px 16px; border-bottom:1px solid var(--border); font-size:14px; vertical-align:middle;}
    tbody tr.player-row{cursor:pointer;}
    tbody tr.player-row:hover{background:var(--purple-50);}
    .name{font-weight:700; color:var(--ink);}
    .mobile{color:var(--ink-muted); font-size:12px; margin-top:2px;}
    .num{font-family:var(--font-display); font-weight:600;}
    .streak{color:#854F0B;}
    /* fixed-width slot for the leading fire/arrow so bold numbers align down the column */
    .lead{display:inline-block; width:22px;}
    .sub{display:block; font-size:12px; color:var(--ink-muted); font-weight:400; margin-top:2px;}
    .trend{font-size:14px; font-weight:700;}
    .trend.up{color:var(--green-500);}
    .trend.down{color:#C2620E;}
    .trend.flat{color:var(--ink-muted); font-weight:400;}
    .draft-pill{
      display:inline-block; margin-left:8px; vertical-align:middle;
      background:#FAEEDA; color:#854F0B;
      font-size:11px; font-weight:700; padding:2px 9px; border-radius:20px;
    }
    .abandoned-pill{
      display:inline-block; margin-left:8px; vertical-align:middle;
      background:var(--purple-50); color:var(--ink-muted); border:1px solid var(--border);
      font-size:11px; font-weight:700; padding:2px 9px; border-radius:20px;
    }
    .muted{color:var(--ink-muted);}
    .toggle-label{
      color:var(--purple-500); font-weight:700; font-size:13px; white-space:nowrap;
    }
    tr.player-row:hover .toggle-label{text-decoration:underline;}
    tr.player-row.open .toggle-label{color:var(--ink-muted);}

    /* expanded synopsis row */
    tr.detail-row > td{padding:0; border-bottom:1px solid var(--border); background:var(--purple-50);}
    .detail-inner{padding:18px 22px; max-width:760px;}
    .detail-head{font-family:var(--font-display); font-size:14px; font-weight:600; color:var(--purple-700);
      text-transform:uppercase; letter-spacing:.04em; margin-bottom:8px; display:flex; align-items:center; gap:8px;}
    .synopsis{font-size:15px; line-height:1.65; color:var(--ink); white-space:pre-wrap;}
    .synopsis.loading,.synopsis.error{color:var(--ink-muted); font-style:italic;}
    .spinner{width:14px; height:14px; border:2px solid var(--purple-300); border-top-color:var(--purple-500);
      border-radius:50%; display:inline-block; animation:spin .8s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg);}}

    .state{padding:60px 20px; text-align:center; color:var(--ink-muted); font-size:16px;}

    .mobile-warn{display:none;}
    @media (max-width:760px){
      .container,header{display:none;}
      .mobile-warn{
        display:flex; flex-direction:column; align-items:center; justify-content:center;
        min-height:100vh; text-align:center; padding:40px; gap:12px;
        background:linear-gradient(160deg,var(--purple-800),var(--purple-600)); color:#fff;
      }
      .mobile-warn .emoji{font-size:40px;}
      .mobile-warn h2{font-family:var(--font-display); font-weight:600;}
      .mobile-warn p{color:var(--purple-300); max-width:300px;}
    }
  </style>
</head>
<body>

  <div class="mobile-warn">
    <div class="emoji">🖥️</div>
    <h2>Open the board on a desktop</h2>
    <p>The player board is built for a big screen — switch to a laptop or desktop to view it.</p>
  </div>

  <header>
    <div class="logo">
      <div class="logo-mark"><img src="/icons/noun-sunshine-5125127.svg" alt="" aria-hidden="true"></div>
      <div class="title">Player Board<small>Summer Pages · admin</small></div>
    </div>
    <div class="gen" id="generated"></div>
  </header>

  <div class="container">
    <div class="stats" id="stats"></div>
    <div id="table-wrap">
      <div class="state" id="state">Loading players…</div>
    </div>
  </div>

  <script>
    // Admin board — fetches the public rollup endpoint. Defaults to prod,
    // but honors local.json's apiserver override (same mechanism j2auth
    // uses) so local dev talks to a local server. local.json is gitignored,
    // so in production this fetch 404s and we stay on prod.
    let API = 'https://api.badjupiter.cloud';

    async function resolveApi(){
      try {
        const r = await fetch('/local.json', {cache: 'no-store'});
        if(r.ok){
          const cfg = await r.json();
          if(cfg.apiserver) API = cfg.apiserver;
        }
      } catch (_) { /* no local.json → prod */ }
    }

    function fmtDate(iso){
      if(!iso) return '—';
      const [y,m,d] = iso.split('T')[0].split('-').map(Number);
      return new Date(y, m-1, d).toLocaleDateString('en-US',{month:'short',day:'numeric'});
    }
    function fmtPing(iso){
      if(!iso) return '—';
      return new Date(iso).toLocaleString('en-US',{month:'short',day:'numeric',hour:'numeric',minute:'2-digit'});
    }

    async function load(){
      try {
        const res = await fetch(API + '/journal/board/');
        if(!res.ok) throw new Error('HTTP ' + res.status);
        const data = await res.json();
        render(data);
      } catch (err) {
        document.getElementById('state').textContent = 'Could not load the board: ' + err.message;
      }
    }

    const esc = s => (s || '').replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));

    // length trend arrow, shown left of the word count
    function trendArrow(trend){
      if(trend === 'up')   return '<span class="trend up" title="Posts getting longer">↑</span>';
      if(trend === 'down') return '<span class="trend down" title="Posts getting shorter">↓</span>';
      if(trend === 'flat') return '<span class="trend flat" title="Steady length">→</span>';
      return '';  // fewer than 2 entries
    }
    const synopsisCache = {};  // uuid -> text, so re-opening doesn't refetch

    function render(data){
      document.getElementById('generated').textContent =
        'as of ' + fmtPing(data.generated_at);

      const t = data.totals;
      document.getElementById('stats').innerHTML = `
        <div class="stat"><div class="stat-num">${t.players}</div><div class="stat-label">players</div></div>
        <div class="stat"><div class="stat-num">${t.entries}</div><div class="stat-label">total entries</div></div>
        <div class="stat"><div class="stat-num">${(t.words || 0).toLocaleString()}</div><div class="stat-label">total words</div></div>
      `;

      if(!data.players.length){
        document.getElementById('table-wrap').innerHTML =
          '<div class="state">No players registered yet.</div>';
        return;
      }

      const rows = data.players.map(p => `
        <tr class="player-row" data-uuid="${p.uuid}">
          <td>
            <span class="name">${esc(p.name)}</span>
            ${p.drafting ? '<span class="draft-pill">✏️ writing</span>' : ''}
            ${p.abandoned ? `<span class="abandoned-pill" title="Started but never submitted">${p.abandoned} unfinished</span>` : ''}
            <div class="mobile">${p.mobile}</div>
          </td>
          <td>
            <span class="lead">${p.streak >= 2 ? '🔥' : ''}</span>${p.streak >= 2
              ? `<span class="num streak">${p.streak}</span> <span class="muted">(${p.entries} total)</span>`
              : `<span class="num">${p.entries}</span> <span class="muted">total</span>`}
          </td>
          <td>
            <span class="lead">${trendArrow(p.trend)}</span><span class="num">${(p.words || 0).toLocaleString()}</span>
          </td>
          <td>${fmtDate(p.last_entry_date)}</td>
          <td class="muted">${fmtPing(p.last_ping_at)}</td>
          <td><span class="toggle-label">Summary</span></td>
        </tr>
        <tr class="detail-row" data-detail="${p.uuid}" style="display:none">
          <td colspan="6">
            <div class="detail-inner">
              <div class="detail-head">📋 Activity synopsis</div>
              <div class="synopsis" id="syn-${p.uuid}"></div>
            </div>
          </td>
        </tr>
      `).join('');

      document.getElementById('table-wrap').innerHTML = `
        <table>
          <thead><tr>
            <th>Player</th><th>Activity</th><th>Words</th>
            <th>Last entry</th><th>Last ping</th><th></th>
          </tr></thead>
          <tbody>${rows}</tbody>
        </table>
      `;

      document.querySelectorAll('.player-row').forEach(row => {
        row.addEventListener('click', () => toggleRow(row));
      });
    }

    function toggleRow(row){
      const uuid = row.dataset.uuid;
      const detail = document.querySelector(`tr[data-detail="${uuid}"]`);
      const label = row.querySelector('.toggle-label');
      const open = detail.style.display !== 'none';
      if(open){
        detail.style.display = 'none';
        row.classList.remove('open');
        if(label) label.textContent = 'Summary';
        return;
      }
      detail.style.display = '';
      row.classList.add('open');
      if(label) label.textContent = 'Close';
      loadSynopsis(uuid);
    }

    async function loadSynopsis(uuid){
      const el = document.getElementById('syn-' + uuid);
      if(synopsisCache[uuid]){ el.className = 'synopsis'; el.textContent = synopsisCache[uuid]; return; }
      if(el.dataset.loading) return;
      el.dataset.loading = '1';
      el.className = 'synopsis loading';
      el.innerHTML = '<span class="spinner"></span> Reading entries and summarizing…';
      try {
        const res = await fetch(API + '/journal/board/synopsis/', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({ uuid })
        });
        if(!res.ok) throw new Error('HTTP ' + res.status);
        const data = await res.json();
        synopsisCache[uuid] = data.synopsis;
        el.className = 'synopsis';
        el.textContent = data.synopsis;
      } catch (err) {
        el.className = 'synopsis error';
        el.textContent = 'Could not generate a synopsis: ' + err.message;
      } finally {
        delete el.dataset.loading;
      }
    }

    (async () => { await resolveApi(); load(); })();
  </script>

</body>
</html>
