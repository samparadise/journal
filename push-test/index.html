<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Push Test — Summer Pages</title>
  <meta name="robots" content="noindex">
  <link rel="manifest" href="/site.webmanifest">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <style>
    body{font-family:system-ui,sans-serif;max-width:560px;margin:0 auto;padding:28px 18px;
         background:#2A2380;color:#fff;line-height:1.5;}
    h1{font-size:22px;margin-bottom:4px;}
    .sub{color:#B8B2F6;font-size:14px;margin-bottom:20px;}
    .card{background:#fff;color:#1a1a2e;border-radius:16px;padding:18px;margin-bottom:16px;}
    label{display:block;font-weight:700;font-size:13px;margin-bottom:6px;}
    input,textarea{width:100%;padding:10px;border:1.5px solid #ccc;border-radius:8px;
         font-family:ui-monospace,monospace;font-size:12px;}
    textarea{min-height:120px;}
    button{margin-top:12px;width:100%;padding:13px;border:none;border-radius:10px;
         background:#6B5FE4;color:#fff;font-weight:700;font-size:15px;cursor:pointer;}
    button:disabled{opacity:.5;}
    button.secondary{background:#E85B8C;}
    #log{background:#F5F4FF;border-radius:10px;padding:12px;font-family:ui-monospace,monospace;
         font-size:12px;white-space:pre-wrap;word-break:break-word;min-height:40px;}
    .step{background:rgba(255,255,255,.1);border-radius:10px;padding:12px 14px;margin-bottom:10px;font-size:14px;}
  </style>
</head>
<body>
  <h1>☀️ Push Test</h1>
  <div class="sub">Phase 1 — prove a Web Push reaches this device. Throwaway page.</div>

  <div id="ios-note" class="step" style="display:none">
    📱 <strong>On iPhone/iPad:</strong> tap <strong>Share → Add to Home Screen</strong>,
    then open Summer Pages from the home-screen icon and load this page again.
    iOS only allows notifications from the installed app.
  </div>

  <div class="card">
    <label for="vapid">VAPID public key (application server key)</label>
    <input id="vapid" placeholder="Paste the app server key from `vapid --applicationServerKey`">
    <button id="subscribe">1 · Enable notifications &amp; subscribe</button>
  </div>

  <div class="card">
    <label for="out">2 · Your push subscription (copy → save to a file on the server)</label>
    <textarea id="out" readonly placeholder="Appears here after you subscribe…"></textarea>
    <button id="copy" class="secondary" disabled>Copy subscription</button>
  </div>

  <div id="log">Ready.</div>

  <script>
    const $ = id => document.getElementById(id);
    const log = (m) => { $('log').textContent = m; console.log(m); };

    // iOS needs the PWA installed (standalone) before it can request permission.
    const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
    const standalone = window.matchMedia('(display-mode: standalone)').matches || navigator.standalone;
    if (isIOS && !standalone) $('ios-note').style.display = '';

    function urlB64ToUint8Array(base64) {
      const pad = '='.repeat((4 - base64.length % 4) % 4);
      const b64 = (base64 + pad).replace(/-/g, '+').replace(/_/g, '/');
      const raw = atob(b64);
      return Uint8Array.from([...raw].map(c => c.charCodeAt(0)));
    }

    $('subscribe').addEventListener('click', async () => {
      try {
        const key = $('vapid').value.trim();
        if (!key) return log('Paste the VAPID public key first.');
        if (!('serviceWorker' in navigator)) return log('No service worker support here.');
        if (!('PushManager' in window)) return log('No Push support here (on iOS, install to home screen first).');

        log('Registering service worker…');
        const reg = await navigator.serviceWorker.register('/sw.js');
        await navigator.serviceWorker.ready;

        log('Requesting notification permission…');
        const perm = await Notification.requestPermission();
        if (perm !== 'granted') return log('Permission: ' + perm + ' — enable it in settings and retry.');

        log('Subscribing to push…');
        const sub = await reg.pushManager.subscribe({
          userVisibleOnly: true,
          applicationServerKey: urlB64ToUint8Array(key),
        });
        $('out').value = JSON.stringify(sub.toJSON(), null, 2);
        $('copy').disabled = false;
        log('Subscribed ✓  — copy the subscription below and run the server send-script.');
      } catch (e) {
        log('Error: ' + (e && e.message ? e.message : e));
      }
    });

    $('copy').addEventListener('click', async () => {
      try { await navigator.clipboard.writeText($('out').value); log('Copied ✓'); }
      catch (e) { log('Copy failed — select the text manually.'); }
    });
  </script>
</body>
</html>
