<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2A2380"/>
      <stop offset="1" stop-color="#4F46B8"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- decorative circles -->
  <circle cx="1060" cy="90" r="200" fill="#6B5FE4" opacity="0.25"/>
  <circle cx="120" cy="560" r="160" fill="#E85B8C" opacity="0.18"/>

  <!-- sun badge -->
  <rect x="100" y="150" width="150" height="150" rx="36" fill="#FAC775"/>
  <g transform="translate(175,225)" stroke="#1a1a2e" stroke-width="7" stroke-linecap="round" fill="none">
    <circle r="28" fill="#1a1a2e" stroke="none"/>
    <line x1="0" y1="-44" x2="0" y2="-56"/>
    <line x1="31" y1="-31" x2="40" y2="-40"/>
    <line x1="44" y1="0" x2="56" y2="0"/>
    <line x1="31" y1="31" x2="40" y2="40"/>
    <line x1="0" y1="44" x2="0" y2="56"/>
    <line x1="-31" y1="31" x2="-40" y2="40"/>
    <line x1="-44" y1="0" x2="-56" y2="0"/>
    <line x1="-31" y1="-31" x2="-40" y2="-40"/>
  </g>

  <!-- title -->
  <text x="300" y="225" font-family="Verdana, Arial, sans-serif" font-size="84" font-weight="bold" fill="#FFFFFF">Summer Pages</text>
  <text x="300" y="290" font-family="Verdana, Arial, sans-serif" font-size="38" fill="#B8B2F6">Your summer, in your own words</text>

  <!-- prompt card -->
  <rect x="100" y="370" width="1000" height="160" rx="24" fill="#FFFFFF" opacity="0.97"/>
  <rect x="130" y="402" width="120" height="44" rx="22" fill="#FAC775"/>
  <text x="190" y="432" font-family="Verdana, Arial, sans-serif" font-size="24" font-weight="bold" fill="#5C3A00" text-anchor="middle">Day 12</text>
  <text x="130" y="500" font-family="Verdana, Arial, sans-serif" font-size="34" fill="#1a1a2e">A new writing adventure, every morning ✏️</text>

</svg>
